# Fluent Bit Configuration - GCP VM (wordpress-1-vm)
# Location: /etc/fluent-bit/fluent-bit.conf
# Updated: January 2026
# Ships Apache logs to smokehouse via Tailscale

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File /etc/fluent-bit/parsers.conf

# =============================================================================
# INPUTS - Apache Access Logs
# =============================================================================

# brianchaplow.com HTTPS access log
[INPUT]
    Name              tail
    Path              /var/log/apache2/brianchaplow-https-access.log
    Tag               apache.brianchaplow
    Parser            apache_combined_geo
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/brianchaplow.db

# bytesbourbonbbq.com HTTPS access log
[INPUT]
    Name              tail
    Path              /var/log/apache2/bytesbourbonbbq-https-access.log
    Tag               apache.bytesbourbonbbq
    Parser            apache_combined_geo
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/bytesbourbonbbq.db

# =============================================================================
# FILTERS
# =============================================================================

# Add site identifier
[FILTER]
    Name            modify
    Match           apache.brianchaplow
    Add             site brianchaplow.com

[FILTER]
    Name            modify
    Match           apache.bytesbourbonbbq
    Add             site bytesbourbonbbq.com

# Add source tag
[FILTER]
    Name            modify
    Match           apache.*
    Add             source apache
    Add             origin gcp-vm

# =============================================================================
# OUTPUT - OpenSearch via Tailscale
# =============================================================================

# Send to smokehouse via Tailscale mesh
# Tailscale IP: 100.110.112.98 (stable across network changes)
[OUTPUT]
    Name            es
    Match           apache.*
    Host            100.110.112.98
    Port            9200
    HTTP_User       admin
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           apache-parsed-v2
    Logstash_Format Off
    Suppress_Type_Name On
    tls             On
    tls.verify      Off
