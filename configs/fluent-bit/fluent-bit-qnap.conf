# Fluent Bit Configuration - QNAP NAS (smokehouse)
# Location: /share/Container/SOC/ingestion/fluentbit/fluent-bit.conf
# Updated: January 2026 - VLAN 20 (SOC) architecture
# Host IP: 10.10.20.10

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf
    Parsers_File /fluentbit/parsers.conf

# =============================================================================
# INPUTS
# =============================================================================

# INPUT: Zeek logs (network analysis)
[INPUT]
    Name              tail
    Path              /logs/zeek/*.log
    Tag               zeek.*
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /fluentbit/state/zeek.db

# INPUT: Suricata eve.json (IDS alerts and flow data)
# Source: eth4 SPAN port via MokerLink mirror (TE10 → eth4)
[INPUT]
    Name              tail
    Path              /logs/suricata/eve.json
    Tag               suricata.eve
    Parser            json
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /fluentbit/state/suricata_eve.db

# INPUT: Syslog (TCP) - receives from network devices, VMs
[INPUT]
    Name            syslog
    Mode            tcp
    Listen          0.0.0.0
    Port            5514
    Tag             syslog.tcp
    Parser          syslog-rfc3164

# INPUT: Syslog (UDP) - receives from network devices, VMs
[INPUT]
    Name            syslog
    Mode            udp
    Listen          0.0.0.0
    Port            5514
    Tag             syslog.udp
    Parser          syslog-rfc3164

# =============================================================================
# FILTERS
# =============================================================================

# FILTER: Tag Zeek records with source
[FILTER]
    Name            modify
    Match           zeek.*
    Add             source zeek
    Add             vlan SOC

# FILTER: Tag Suricata records with source
[FILTER]
    Name            modify
    Match           suricata.eve
    Add             source suricata
    Add             vlan SOC

# FILTER: Tag syslog records with source
[FILTER]
    Name            modify
    Match           syslog.*
    Add             source syslog

# =============================================================================
# OUTPUTS
# =============================================================================

# OUTPUT: OpenSearch (SIEM)
# Host: smokehouse on VLAN 20 (SOC) - 10.10.20.10
[OUTPUT]
    Name            es
    Match           *
    Host            10.10.20.10
    Port            9200
    HTTP_User       admin
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           fluentbit-default
    Logstash_Format Off
    Suppress_Type_Name On
    tls             On
    tls.verify      Off
