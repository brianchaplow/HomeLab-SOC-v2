# Fluent Bit Parsers - QNAP NAS (smokehouse)
# Location: /share/Container/SOC/ingestion/fluentbit/parsers.conf

# Standard JSON parser (for Suricata eve.json)
[PARSER]
    Name        json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

# Syslog RFC3164 (traditional format)
[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S

# Syslog RFC5424 (modern format)
[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]{1,5})\>1 (?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*?)\]|-)+) (?<message>.+)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

# Zeek conn.log format
[PARSER]
    Name        zeek_conn
    Format      regex
    Regex       ^(?<ts>[^\t]+)\t(?<uid>[^\t]+)\t(?<src_ip>[^\t]+)\t(?<src_port>[^\t]+)\t(?<dst_ip>[^\t]+)\t(?<dst_port>[^\t]+)\t(?<proto>[^\t]+)\t(?<service>[^\t]+)\t(?<duration>[^\t]+)\t(?<orig_bytes>[^\t]+)\t(?<resp_bytes>[^\t]+)\t(?<conn_state>[^\t]+)\t(?<local_orig>[^\t]+)\t(?<local_resp>[^\t]+)\t(?<missed_bytes>[^\t]+)\t(?<history>[^\t]+)\t(?<orig_pkts>[^\t]+)\t(?<orig_ip_bytes>[^\t]+)\t(?<resp_pkts>[^\t]+)\t(?<resp_ip_bytes>[^\t]+)\t(?<tunnel_parents>[^\t]*)$
    Time_Key    ts
    Time_Format %s.%L
