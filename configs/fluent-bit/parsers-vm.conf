# Fluent Bit Parsers - GCP VM
# Location: /etc/fluent-bit/parsers.conf
# Apache combined format with Cloudflare geo headers

# Standard Apache Combined Log Format
[PARSER]
    Name        apache_combined
    Format      regex
    Regex       ^(?<client_ip>[^ ]*) - (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<status>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

# Apache Combined with Cloudflare Geo Headers
# Format: %h %l %u %t "%r" %>s %b "%{Referer}i" "%{User-Agent}i" "%{CF-IPCountry}i" "%{CF-IPCity}i" "%{CF-Connecting-IP}i"
[PARSER]
    Name        apache_combined_geo
    Format      regex
    Regex       ^(?<client_ip>[^ ]*) - (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<status>[^ ]*) (?<size>[^ ]*) "(?<referer>[^\"]*)" "(?<agent>[^\"]*)" "(?<cf_country>[^\"]*)" "(?<cf_city>[^\"]*)" "(?<cf_connecting_ip>[^\"]*)"$
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

# Simpler format without all geo fields (fallback)
[PARSER]
    Name        apache_combined_cf
    Format      regex
    Regex       ^(?<client_ip>[^ ]*) - (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<status>[^ ]*) (?<size>[^ ]*) "(?<referer>[^\"]*)" "(?<agent>[^\"]*)" "(?<cf_country>[^\"]*)"
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z
